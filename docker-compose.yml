version: "3.9"

services:
  opensre:
    build: .
    container_name: opensre
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - opensre_data:/app/data
    environment:
      - OPENSRE_DB_PATH=/app/data/opensre_incidents.db

  prometheus:
    image: prom/prometheus:latest
    container_name: opensre_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - opensre

  grafana:
    image: grafana/grafana-oss:latest
    container_name: opensre_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Auto-provision the Prometheus datasource + the OpenSRE dashboard on startup.
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  opensre_data:
