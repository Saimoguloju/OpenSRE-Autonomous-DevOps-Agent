name: OpenSRE CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Lint with black
      run: black --check . --exclude venv/

    - name: Lint with flake8
      run: |
        # Fail the build on syntax errors or undefined names.
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude venv/
        # Treat everything else as warnings (non-blocking).
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude venv/

    - name: Run unit tests with coverage
      run: pytest --cov=. --cov-report=term-missing --cov-report=xml
      env:
        ANTHROPIC_API_KEY: "mock_key"
        SIMULATION_MODE: "true"
        OPENSRE_DB_PATH: "test_incidents.db"
